<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bicycle Trainer 다운로드</title>
    <style>
      :root {
        color-scheme: light;
        --green: #0e7c66;
        --green-dark: #075f4d;
        --text: #14211d;
        --muted: #607169;
        --panel: #ffffff;
        --bg: #eef5f1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 24px;
        border: 1px solid #d9e5df;
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 16px 40px rgba(14, 35, 29, 0.1);
      }

      .kicker {
        margin: 0 0 8px;
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
      }

      a.button {
        display: flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Android APK</p>
      <h1>Bicycle Trainer</h1>
      <p>다운로드가 자동으로 시작되지 않으면 아래 버튼을 누르세요.</p>
      <a class="button" id="downloadLink" href="../downloads/bicycle-trainer-1.0.4.apk" download>앱 다운로드</a>
      <p class="note">설치 중 경고가 보이면 Android 설정에서 이 브라우저의 알 수 없는 앱 설치를 허용해야 합니다.</p>
    </main>
    <script>
      window.addEventListener("load", () => {
        window.setTimeout(() => {
          document.getElementById("downloadLink").click();
        }, 500);
      });
    </script>
  </body>
</html>
